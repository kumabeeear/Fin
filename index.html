<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Digital Omikuji</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Digital Omikuji</h1>

    <p class="instruction">Type your question and draw your fortune.</p>

    <input id="questionInput" type="text" placeholder="Enter your question..." />

    <button id="drawButton">Draw Fortune</button>

    <p id="savedQuestion"></p>

    <div id="jar" class="jar">
      Fortune Jar
    </div>

    <div id="fortuneSlip" class="fortune-slip hidden">
      <h2 id="fortuneLevel"></h2>
      <p id="fortuneMessage"></p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
